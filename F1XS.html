<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>《救救你自己吧！》- 1xshed</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background: #fff9e6;
            color: #222;
            font-family: "微软雅黑", sans-serif;
        }
        .container {
            display: flex;
            height: 100vh;
        }
        .sidebar {
            width: 240px;
            background: #f5efe0;
            padding: 30px 20px;
            border-right: 1px solid #ddd;
        }
        .sidebar h3 {
            margin-bottom: 20px;
            text-align: center;
        }
        .chap {
            padding: 10px;
            margin: 6px 0;
            cursor: pointer;
            border-radius: 6px;
        }
        .chap:hover {
            background: #ffd370;
        }
        .content {
            flex: 1;
            padding: 50px;
            overflow-y: auto;
            font-size: 18px;
            line-height: 1.9;
        }
        .title {
            font-size: 26px;
            text-align: center;
            margin-bottom: 30px;
        }
        p {
            text-indent: 2em;
            margin-bottom: 16px;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="sidebar">
        <h3>章节目录</h3>
        <div class="chap" onclick="go(1)">第一章 你果然有问题</div>
        <div class="chap" onclick="go(2)">第二章 你怎么不打了</div>
        <div class="chap" onclick="go(3)">第三章 没有这回事</div>
        <div class="chap" onclick="go(4)">第四章 非正式接触（创作中）</div>
    </div>

    <div class="content" id="content"></div>
</div>

<script src="F1XS.js"></script>
</body>
</html>
